name: Render Video

on:
  workflow_dispatch:
    inputs:
      scenes_json:
        description: "Scene texts as JSON array"
        required: true
      props_json:
        description: "Video props (title, tips, accent, etc) as JSON"
        required: true
      voice:
        description: "Voice ID (ElevenLabs ID or edge-tts name like id-ID-ArdiNeural)"
        default: "id-ID-ArdiNeural"

jobs:
  render:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Node dependencies
        run: npm ci

      - name: Install Python deps
        run: pip install edge-tts

      - name: Generate voiceover MP3s
        run: |
          python - <<'PYEOF'
          import asyncio, json, os, re
          from pathlib import Path

          scenes = json.loads(os.environ["SCENES_JSON"])
          voice  = os.environ.get("VOICE", "id-ID-ArdiNeural")
          out_dir = Path("public/voiceover/generated")
          out_dir.mkdir(parents=True, exist_ok=True)

          if not re.match(r'^[a-z]{2}-[A-Z]{2}-', voice):
              voice = "id-ID-ArdiNeural"

          async def gen_edgetts(text, voice_name, out_file):
              import edge_tts
              for attempt in range(5):
                  try:
                      communicate = edge_tts.Communicate(text, voice_name)
                      await communicate.save(str(out_file))
                      return
                  except Exception as e:
                      if attempt < 4:
                          wait = 3 * (attempt + 1)
                          print(f"  retry {attempt+1}/4 after {wait}s ({e})")
                          await asyncio.sleep(wait)
                      else:
                          raise

          async def main():
              print(f"Voice engine: edge-tts (voice={voice})")
              for scene in scenes:
                  print(f"→ edge-tts {scene['id']} …")
                  await gen_edgetts(scene["text"], voice, out_dir / f"{scene['id']}.mp3")
                  print(f"✓ {scene['id']}")
                  await asyncio.sleep(0.5)

          asyncio.run(main())
          PYEOF
        env:
          SCENES_JSON: ${{ inputs.scenes_json }}
          VOICE: ${{ inputs.voice }}

      - name: Render video with Remotion
        run: |
          PROPS=$(python - <<'PYEOF'
          import json, os, pathlib, sys, urllib.request

          def fetch(url, dest, timeout=20):
              try:
                  req = urllib.request.Request(url, headers={"User-Agent": "Mozilla/5.0"})
                  with urllib.request.urlopen(req, timeout=timeout) as r, open(dest, "wb") as f:
                      f.write(r.read())
                  return True
              except Exception as e:
                  print(f"  skip {url}: {e}", file=sys.stderr, flush=True)
                  return False

          props = json.loads(os.environ["PROPS_JSON"])
          props["sceneDurations"] = []
          pathlib.Path("public").mkdir(parents=True, exist_ok=True)

          logo_url = props.pop("watermarkLogoUrl", None)
          if logo_url:
              ext = logo_url.split(".")[-1].split("?")[0] or "png"
              if fetch(logo_url, f"public/watermark-logo.{ext}"):
                  props["watermarkLogo"] = f"watermark-logo.{ext}"

          # Icon brand asli (simple-icons) + screenshot tool (thum.io) per tip
          for i, tip in enumerate(props.get("tips", [])):
              slug = (tip.get("iconSlug") or "").strip().lower()
              if slug and fetch(f"https://cdn.simpleicons.org/{slug}", f"public/tip-icon-{i}.svg"):
                  tip["iconFile"] = f"tip-icon-{i}.svg"
              url = (tip.get("toolUrl") or "").strip()
              if url.startswith("http") and fetch(
                  f"https://image.thum.io/get/width/1200/crop/900/{url}",
                  f"public/tip-shot-{i}.jpg", timeout=45):
                  tip["screenshotFile"] = f"tip-shot-{i}.jpg"

          print(json.dumps(props))
          PYEOF
          )
          mkdir -p out
          npx remotion render GeneratedVideo out/video.mp4 --props="$PROPS" --concurrency=4
        env:
          PROPS_JSON: ${{ inputs.props_json }}

      - name: Upload to Vercel Blob
        run: |
          npm install @vercel/blob --no-save
          node scripts/upload-blob.mjs ${{ github.run_id }}
        env:
          BLOB_READ_WRITE_TOKEN: ${{ secrets.BLOB_READ_WRITE_TOKEN }}

      - name: Notify schedule webhook
        if: always()
        run: |
          if [ -n "$APP_URL" ] && [ -n "$SCHEDULE_WEBHOOK_SECRET" ]; then
            curl -s -X POST "$APP_URL/api/schedule/complete" \
              -H "Content-Type: application/json" \
              -H "X-Schedule-Secret: $SCHEDULE_WEBHOOK_SECRET" \
              -d "{\"runId\": ${{ github.run_id }}}" || true
          fi
        env:
          APP_URL: ${{ secrets.APP_URL }}
          SCHEDULE_WEBHOOK_SECRET: ${{ secrets.SCHEDULE_WEBHOOK_SECRET }}
