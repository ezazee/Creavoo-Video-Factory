name: Render Video

on:
  workflow_dispatch:
    inputs:
      scenes_json:
        description: "Scene texts as JSON array"
        required: true
      props_json:
        description: "Video props (title, tips, accent, etc) as JSON"
        required: true
      voice:
        description: "Voice ID (ElevenLabs ID or edge-tts name like id-ID-ArdiNeural)"
        default: "id-ID-ArdiNeural"

jobs:
  render:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Node dependencies
        run: npm ci

      - name: Install Python deps
        run: pip install edge-tts requests

      - name: Generate voiceover MP3s
        run: |
          python - <<'PYEOF'
          import asyncio, json, os, sys, requests
          from pathlib import Path

          scenes = json.loads(os.environ["SCENES_JSON"])
          voice  = os.environ.get("VOICE", "id-ID-ArdiNeural")
          el_key = os.environ.get("ELEVENLABS_API_KEY", "")
          out_dir = Path("public/voiceover/generated")
          out_dir.mkdir(parents=True, exist_ok=True)

          # edge-tts voices follow pattern "xx-XX-NeuralName" (e.g. id-ID-ArdiNeural)
          import re
          is_edge_tts_voice = bool(re.match(r'^[a-z]{2}-[A-Z]{2}-', voice))
          use_elevenlabs = bool(el_key) and not is_edge_tts_voice

          def gen_elevenlabs(text, voice_id, out_file):
              res = requests.post(
                  f"https://api.elevenlabs.io/v1/text-to-speech/{voice_id}",
                  headers={"xi-api-key": el_key, "Content-Type": "application/json"},
                  json={
                      "text": text,
                      "model_id": "eleven_multilingual_v2",
                      "voice_settings": {"stability": 0.5, "similarity_boost": 0.75},
                  },
                  timeout=60,
              )
              if not res.ok:
                  raise RuntimeError(f"ElevenLabs error {res.status_code}: {res.text[:200]}")
              with open(str(out_file), "wb") as f:
                  f.write(res.content)

          async def gen_edgetts(text, voice_name, out_file):
              import edge_tts
              communicate = edge_tts.Communicate(text, voice_name)
              await communicate.save(str(out_file))

          async def main():
              for scene in scenes:
                  out_file = out_dir / f"{scene['id']}.mp3"
                  print(f"→ generating {scene['id']} ({('ElevenLabs' if use_elevenlabs else 'edge-tts')}) …")
                  if use_elevenlabs:
                      try:
                          gen_elevenlabs(scene["text"], voice, out_file)
                      except Exception as e:
                          print(f"  ElevenLabs failed ({e}), falling back to edge-tts")
                          await gen_edgetts(scene["text"], "id-ID-ArdiNeural", out_file)
                  else:
                      await gen_edgetts(scene["text"], voice, out_file)
                  print(f"✓ {out_file}")

          asyncio.run(main())
          PYEOF
        env:
          SCENES_JSON: ${{ inputs.scenes_json }}
          VOICE: ${{ inputs.voice }}
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}

      - name: Render video with Remotion
        run: |
          PROPS=$(python - <<'PYEOF'
          import json, os
          props = json.loads(os.environ["PROPS_JSON"])
          props["sceneDurations"] = []
          print(json.dumps(props))
          PYEOF
          )
          mkdir -p out
          npx remotion render GeneratedVideo out/video.mp4 --props="$PROPS"
        env:
          PROPS_JSON: ${{ inputs.props_json }}

      - name: Upload to Vercel Blob
        run: |
          npm install @vercel/blob --no-save
          node scripts/upload-blob.mjs ${{ github.run_id }}
        env:
          BLOB_READ_WRITE_TOKEN: ${{ secrets.BLOB_READ_WRITE_TOKEN }}
