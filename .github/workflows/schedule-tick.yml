name: Schedule Tick

# Cron autopost: cek jadwal tiap 15 menit + proses job yang selesai render.
# Butuh repo secrets: APP_URL (mis. https://creavoo-factory.vercel.app) dan CRON_SECRET.
on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch: {}

jobs:
  tick:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Tick both profiles
        run: |
          for profile in creavoo zaportfolio; do
            echo "→ tick $profile"
            curl -sf --max-time 60 \
              -H "Authorization: Bearer $CRON_SECRET" \
              "$APP_URL/api/schedule/tick?profile=$profile" || echo "  tick $profile failed (non-fatal)"
          done
        env:
          APP_URL: ${{ secrets.APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
