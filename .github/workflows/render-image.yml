name: Render Image

on:
  workflow_dispatch:
    inputs:
      props_json:
        description: "Image props as JSON (videoTitle, tips, accent, etc)"
        required: true
      type:
        description: "Post type: single or carousel"
        default: "single"
      total_slides:
        description: "Total slides for carousel (cover + tips + outro)"
        default: "7"
      style:
        description: "Visual style: creavoo (dark) or zaportfolio (light)"
        default: "creavoo"

jobs:
  render:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Prepare props & download assets
        id: prep
        run: |
          BASE_PROPS=$(python3 - <<'PYEOF'
          import json, os, pathlib, sys, urllib.request

          def fetch(url, dest, timeout=20):
              try:
                  req = urllib.request.Request(url, headers={"User-Agent": "Mozilla/5.0"})
                  with urllib.request.urlopen(req, timeout=timeout) as r, open(dest, "wb") as f:
                      f.write(r.read())
                  return True
              except Exception as e:
                  print(f"  skip {url}: {e}", file=sys.stderr, flush=True)
                  return False

          props = json.loads(os.environ["PROPS_JSON"])
          pathlib.Path("public").mkdir(parents=True, exist_ok=True)

          logo_url = props.pop("watermarkLogoUrl", None)
          if logo_url:
              ext = logo_url.split(".")[-1].split("?")[0] or "png"
              if fetch(logo_url, f"public/watermark-logo.{ext}"):
                  props["watermarkLogo"] = f"watermark-logo.{ext}"

          # Icon brand asli (simple-icons) + screenshot tool (thum.io) per tip
          for i, tip in enumerate(props.get("tips", [])):
              slug = (tip.get("iconSlug") or "").strip().lower()
              if slug and fetch(f"https://cdn.simpleicons.org/{slug}", f"public/tip-icon-{i}.svg"):
                  tip["iconFile"] = f"tip-icon-{i}.svg"
              url = (tip.get("toolUrl") or "").strip()
              if url.startswith("http") and fetch(
                  f"https://image.thum.io/get/width/1200/crop/900/{url}",
                  f"public/tip-shot-{i}.jpg", timeout=45):
                  tip["screenshotFile"] = f"tip-shot-{i}.jpg"

          props["style"] = os.environ.get("STYLE", "creavoo")
          print(json.dumps(props))
          PYEOF
          )
          echo "base_props=$BASE_PROPS" >> $GITHUB_OUTPUT
        env:
          PROPS_JSON: ${{ inputs.props_json }}
          STYLE: ${{ inputs.style }}

      - name: Render single post
        if: ${{ inputs.type == 'single' }}
        run: |
          mkdir -p out
          npx remotion still InstagramPost out/post.jpg \
            --props='${{ steps.prep.outputs.base_props }}' \
            --image-format=jpeg --jpeg-quality=95

      - name: Render carousel slides
        if: ${{ inputs.type == 'carousel' }}
        run: |
          mkdir -p out
          TOTAL=${{ inputs.total_slides }}
          BASE='${{ steps.prep.outputs.base_props }}'
          for i in $(seq 0 $((TOTAL - 1))); do
            SLIDE_PROPS=$(python3 -c "
          import json, sys
          p = json.loads(sys.argv[1])
          p['slideIndex'] = $i
          p['totalSlides'] = $TOTAL
          print(json.dumps(p))
          " "$BASE")
            echo "→ Rendering slide $i/$((TOTAL-1))…"
            npx remotion still InstagramCarouselSlide "out/slide-$i.jpg" \
              --props="$SLIDE_PROPS" \
              --image-format=jpeg --jpeg-quality=95
          done

      - name: Upload to MinIO
        run: |
          npm install @aws-sdk/client-s3 --no-save
          node scripts/upload-image-blob.mjs ${{ github.run_id }} ${{ inputs.type }}
        env:
          MINIO_ENDPOINT: ${{ secrets.MINIO_ENDPOINT }}
          MINIO_ACCESS_KEY: ${{ secrets.MINIO_ACCESS_KEY }}
          MINIO_SECRET_KEY: ${{ secrets.MINIO_SECRET_KEY }}
          MINIO_BUCKET: ${{ secrets.MINIO_BUCKET }}
          MINIO_REGION: ${{ secrets.MINIO_REGION }}
          MINIO_PUBLIC_URL: ${{ secrets.MINIO_PUBLIC_URL }}

      - name: Notify schedule webhook
        if: always()
        run: |
          if [ -z "$APP_URL" ] || [ -z "$SCHEDULE_WEBHOOK_SECRET" ]; then
            echo "APP_URL / SCHEDULE_WEBHOOK_SECRET tidak di-set, skip notify"
            exit 0
          fi
          # Retry: transient glitch (cold start, deploy sesaat) bisa bikin request
          # nyasar (redirect/error) sekali — job jadi stuck permanen tanpa retry ini.
          for attempt in 1 2 3 4 5; do
            RES=$(curl -s -w "\n%{http_code}" -X POST "$APP_URL/api/schedule/complete" \
              -H "Content-Type: application/json" \
              -H "X-Schedule-Secret: $SCHEDULE_WEBHOOK_SECRET" \
              -d "{\"runId\": ${{ github.run_id }}}")
            CODE=$(echo "$RES" | tail -n1)
            BODY=$(echo "$RES" | sed '$d')
            echo "attempt $attempt: HTTP $CODE — $BODY"
            if [ "$CODE" = "200" ] && echo "$BODY" | grep -q '"ok":true'; then
              echo "✓ webhook sukses"
              exit 0
            fi
            sleep $((attempt * 5))
          done
          echo "⚠️ webhook gagal setelah 5 percobaan — job mungkin perlu diproses manual"
        env:
          APP_URL: ${{ secrets.APP_URL }}
          SCHEDULE_WEBHOOK_SECRET: ${{ secrets.SCHEDULE_WEBHOOK_SECRET }}
