name: Test Coqui TTS Timing (benchmark only, tidak dipakai render production)

on:
  workflow_dispatch: {}

jobs:
  benchmark:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Report runner specs
        run: |
          echo "CPU cores: $(nproc)"
          echo "Memory:"
          free -h
          echo "Disk:"
          df -h /

      - name: Install torch (CPU) + coqui-tts — timed
        run: |
          START=$(date +%s)
          pip install --quiet torch torchaudio --index-url https://download.pytorch.org/whl/cpu
          pip install --quiet coqui-tts
          END=$(date +%s)
          echo "INSTALL_SECONDS=$((END - START))" | tee -a install_time.txt

      - name: Download XTTS-v2 model + synthesize scene teks pendek (cold run) — timed
        run: |
          python3 - <<'PYEOF'
          import time, torch
          t0 = time.time()
          from TTS.api import TTS
          device = "cpu"
          tts = TTS("tts_models/multilingual/multi-dataset/xtts_v2").to(device)
          t1 = time.time()
          print(f"MODEL_LOAD_SECONDS={t1 - t0:.1f}")

          # Teks representatif — mirip panjang 1 scene asli (2-3 kalimat pendek)
          text = "Lima trik Git yang jarang diketahui developer. Kalau kamu masih pakai cara manual, kamu bakal kaget lihat ini. Simak sampai habis ya."

          # Tanpa reference WAV — pakai speaker built-in buat ukur waktu inti synthesis
          # (voice cloning nambah overhead kecil di awal untuk extract conditioning latents,
          # tapi durasi synthesis utamanya proporsional sama panjang teks, bukan speaker-nya)
          t2 = time.time()
          tts.tts_to_file(
              text=text,
              file_path="scene_test.wav",
              language="id" if "id" in tts.languages else "en",
              speaker=tts.speakers[0] if tts.speakers else None,
          )
          t3 = time.time()
          print(f"COLD_SYNTHESIS_SECONDS={t3 - t2:.1f}")

          # Run kedua — model sudah warm di memory, ukur waktu murni per-scene
          t4 = time.time()
          tts.tts_to_file(
              text=text,
              file_path="scene_test2.wav",
              language="id" if "id" in tts.languages else "en",
              speaker=tts.speakers[0] if tts.speakers else None,
          )
          t5 = time.time()
          print(f"WARM_SYNTHESIS_SECONDS={t5 - t4:.1f}")
          PYEOF

      - name: Report audio duration hasil
        run: |
          pip install --quiet mutagen
          python3 -c "
          from mutagen.wave import WAVE
          for f in ['scene_test.wav', 'scene_test2.wav']:
              try:
                  w = WAVE(f)
                  print(f'{f}: {w.info.length:.1f}s audio dihasilkan')
              except Exception as e:
                  print(f'{f}: gagal baca ({e})')
          "

      - name: Ringkasan estimasi 7 scene
        run: |
          echo "── Lihat log step 'Download XTTS-v2 model...' di atas untuk angka WARM_SYNTHESIS_SECONDS ──"
          echo "Estimasi render 7 scene = MODEL_LOAD (sekali) + 7 x WARM_SYNTHESIS_SECONDS"
          echo "Bandingkan totalnya ke timeout render-video.yml (30 menit) untuk keputusan aman/tidak."
